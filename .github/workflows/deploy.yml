name: CI / Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build with OpenNext (Cloudflare)
        run: npx @opennextjs/cloudflare build
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: https://pablo.vantax.co.za
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Set Cloudflare Worker secrets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.OAUTH_CLIENT_SECRET }}" | npx wrangler secret put GITHUB_CLIENT_SECRET --name pablo
          echo "${{ secrets.AUTH_SECRET }}" | npx wrangler secret put AUTH_SECRET --name pablo
          echo "${{ secrets.OLLAMA_API_KEY }}" | npx wrangler secret put OLLAMA_API_KEY --name pablo
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run D1 migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler d1 migrations apply pablo-db --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
